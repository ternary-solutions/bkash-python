changelog:
  categories:
    - title: Features
      labels:
        - enhancement
        - feature
    - title: Fixes
      labels:
        - bug
        - fix
    - title: Documentation
      labels:
        - documentation
        - docs
    - title: Dependencies
      labels:
        - dependencies
    - title: CI and Tooling
      labels:
        - ci
        - tooling
  exclude:
    labels:
      - duplicate
      - invalid
      - question
      - wontfix
