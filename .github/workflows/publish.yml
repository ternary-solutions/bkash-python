# Publish to PyPI when a version tag is pushed (e.g. v0.1.0, v1.2.3).
#
# Setup:
# 1. GitHub repo → Settings → Secrets and variables → Actions → New repository secret
#    Name:  PYPI_API_TOKEN
#    Value: your PyPI API token (pypi.org → Account settings → API tokens)
# 2. Hatch uses username __token__ and the token as the password (set via env below).
#
# Layout: expects pyproject.toml at the repository root (typical after moving this
# package to its own repo). If this workflow stays inside a monorepo, move it to the
# monorepo root and set defaults.run.working-directory to packages/bkash_pgw_tokenized,
# or only push v* tags from the standalone package repository.

name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Hatch
        run: pip install --upgrade hatch

      - name: Clean and build
        run: |
          rm -rf dist
          hatch build

      - name: Publish to PyPI
        env:
          HATCH_INDEX_USER: __token__
          HATCH_INDEX_AUTH: ${{ secrets.PYPI_API_TOKEN }}
        run: hatch publish --no-prompt
